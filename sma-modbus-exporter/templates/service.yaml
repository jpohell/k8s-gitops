apiVersion: v1
kind: Service
metadata:
  name: sma-modbus-exporter
  labels:
    app: sma-modbus-exporter
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: sma-modbus-exporter
