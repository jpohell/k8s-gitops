apiVersion: apps/v1
kind: Deployment
metadata:
  name: sma-modbus-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sma-modbus-exporter
  template:
    metadata:
      labels:
        app: sma-modbus-exporter
    spec:
      containers:
      - name: mbmd
        image: volkszaehler/mbmd:latest
        args:
          - "-a=192.168.1.16:502"  
          - "-d=SMA"
          - "-p=8080"
        ports:
          - containerPort: 8080
