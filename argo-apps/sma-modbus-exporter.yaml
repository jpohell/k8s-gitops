apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sma-modbus-exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jpohell/k8s-gitops.git
    targetRevision: main
    path: sma-modbus-exporter
    helm:
      releaseName: sma-modbus-exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
